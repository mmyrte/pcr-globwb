[globalOptions]
outputDir    = <to_be_patched_by_test>
inputDir     = ./test_input/
cloneMap    = clone/clonemap.map
landmask    = mask/mask.map
institution = Testing University
title       = PCR-GLOBWB 2 output (not coupled to MODFLOW), with human factors (non-natural)
description = PCR-GLOBWB run with human factors (non-natural)
startTime = 1998-01-01
endTime   = 2000-12-31
maxSpinUpsInYears = 2
minConvForSoilSto = 0.0
minConvForGwatSto = 0.0
minConvForChanSto = 0.0
minConvForTotlSto = 0.0
spinUpOutputDir = True

[groundwaterOptions]

debugWaterBalance = True

groundwaterPropertiesNC = groundwater/groundwaterProperties5ArcMin.nc
# The file will containspecificYield (m3.m-3), kSatAquifer (m.day-1), recessionCoeff (day-1)
#
# - minimum value for groundwater recession coefficient (day-1) 
minRecessionCoeff = 1.0e-4

# some options for constraining groundwater abstraction
limitFossilGroundWaterAbstraction      = True
estimateOfRenewableGroundwaterCapacity = 0.0
estimateOfTotalGroundwaterThickness    = groundwater/thickness_05min.nc
# minimum and maximum total groundwater thickness 
minimumTotalGroundwaterThickness       = 100.
maximumTotalGroundwaterThickness       = None

# annual pumping capacity for each region (unit: billion cubic meter per year), should be given in a netcdf file
pumpingCapacityNC = groundwater_pumping_capacity/regional_abstraction_limit.nc

# initial conditions:
storGroundwaterIni                        = initialConditions/storGroundwater_1999-12-31.nc
storGroundwaterFossilIni                  = initialConditions/storGroundwaterFossil_1999-12-31.nc
#
# additional initial conditions for pumping behaviors
avgNonFossilGroundwaterAllocationLongIni  = initialConditions/avgNonFossilGroundwaterAllocationLong_1999-12-31.nc
avgNonFossilGroundwaterAllocationShortIni = initialConditions/avgNonFossilGroundwaterAllocationShort_1999-12-31.nc
avgTotalGroundwaterAbstractionIni         = initialConditions/avgTotalGroundwaterAbstraction_1999-12-31.nc
avgTotalGroundwaterAllocationLongIni      = initialConditions/avgTotalGroundwaterAllocationLong_1999-12-31.nc
avgTotalGroundwaterAllocationShortIni     = initialConditions/avgTotalGroundwaterAllocationShort_1999-12-31.nc
#
# additional initial conditions (needed only for MODFLOW run) 
relativeGroundwaterHeadIni                = initialConditions/relativeGroundwaterHead_1999-12-31.nc
baseflowIni                               = initialConditions/baseflow_1999-12-31.nc

# zonal IDs (scale) at which zonal allocation of groundwater is performed  
allocationSegmentsForGroundwater = abstraction_zones/abstraction_zones_30min_05min.nc


[routingOptions]
debugWaterBalance = True

# drainage direction map
lddMap      = routing/lddsound_05min.nc

# cell area (unit: m2)
cellAreaMap = routing/cellsize05min.correct.nc

# routing method:
; routingMethod     = accuTravelTime
; routingMethod  = kinematicWave

# manning coefficient
manningsN   = 0.04

# Option for flood plain simulation
dynamicFloodPlain = True

# manning coefficient for floodplain
floodplainManningsN = 0.07


# channel gradient
gradient             = routing/channel_gradient.nc

# constant channel depth 
constantChannelDepth = routing/bankfull_depth.nc

# constant channel width (optional)
constantChannelWidth = routing/bankfull_width.nc

# minimum channel width (optional)
minimumChannelWidth  = routing/bankfull_width.nc

# channel properties for flooding
bankfullCapacity     = None
# - If None, it will be estimated from (bankfull) channel depth (m) and width (m) 

# files for relative elevation (above minimum dem) 
relativeElevationFiles  = routing/dzRel%04d.nc
relativeElevationLevels = 0.0, 0.01, 0.05, 0.10, 0.20, 0.30, 0.40, 0.50, 0.60, 0.70, 0.80, 0.90, 1.00

# composite crop factors for WaterBodies: 
cropCoefficientWaterNC = routing/cropCoefficientForOpenWater.nc
minCropWaterKC         = 1.00

# lake and reservoir parameters
waterBodyInputNC       = routing/waterBodies5ArcMin.nc
onlyNaturalWaterBodies = False

# initial conditions:
waterBodyStorageIni            = initialConditions/waterBodyStorage_1999-12-31.nc
channelStorageIni              = initialConditions/channelStorage_1999-12-31.nc
readAvlChannelStorageIni       = initialConditions/readAvlChannelStorage_1999-12-31.nc
avgDischargeLongIni            = initialConditions/avgDischargeLong_1999-12-31.nc
avgDischargeShortIni           = initialConditions/avgDischargeShort_1999-12-31.nc
m2tDischargeLongIni            = initialConditions/m2tDischargeLong_1999-12-31.nc
avgBaseflowLongIni             = initialConditions/avgBaseflowLong_1999-12-31.nc
riverbedExchangeIni            = initialConditions/riverbedExchange_1999-12-31.nc
subDischargeIni                = initialConditions/subDischarge_1999-12-31.nc
avgLakeReservoirInflowShortIni = initialConditions/avgLakeReservoirInflowShort_1999-12-31.nc
avgLakeReservoirOutflowLongIni = initialConditions/avgLakeReservoirOutflowLong_1999-12-31.nc
timestepsToAvgDischargeIni     = initialConditions/timestepsToAvgDischarge_1999-12-31.nc


[meteoOptions]
precipitationNC = ./test_input/precipitation.nc
temperatureNC   = ./test_input/temperature.nc
referenceETPotMethod = Hamon
refETPotFileNC  = None
precipitationVariableName = RhiresD
temperatureVariableName   = TabsD
referenceEPotVariableName = None
temperatureConstant      = 0
temperatureFactor        = 1.0
precipitationFactor      = 0.001
avgAnnualPrecipitationIni    = 0.0
avgAnnualTemperatureIni      = 0.0
avgAnnualDiurnalDeltaTempIni = 0.0
outDailyTotNC    = None
outMonthTotNC    = None
outMonthAvgNC    = temperature_before_downscaling,temperature
outMonthEndNC    = None
outAnnuaTotNC    = precipitation_before_downscaling,referencePotET_before_downscaling,precipitation,referencePotET,avgAnnualPrecipitation
outAnnuaAvgNC    = None
outAnnuaEndNC    = None

[meteoDownscalingOptions]
downscalePrecipitation  = False
downscaleTemperature    = False
downscaleReferenceETPot = False
highResolutionDEM    = topography/dem_average.nc
meteoDownscaleIds    = meteo/unique_ids/unique_ids_5_arcmin.nc
temperLapseRateNC    = meteo/temperature_slope.nc
precipLapseRateNC    = meteo/precipitation_slope.nc
temperatCorrelNC     = meteo/temperature_correl.nc
precipitCorrelNC     = meteo/precipitation_correl.nc
smoothingWindowsLength = 0

[landSurfaceOptions]
debugWaterBalance = True
numberOfUpperSoilLayers = 2
topographyNC = topography/merit_dem_processed/topography_parameters.nc
soilPropertiesNC = None
firstStorDepth       = soil/layerDepth_average_1.nc
secondStorDepth      = soil/layerDepth_average_2.nc
soilWaterStorageCap1 = soil/WHC_average_1.nc
soilWaterStorageCap2 = soil/WHC_average_2.nc
airEntryValue1       = soil/psiAir_average_1.nc
airEntryValue2       = soil/psiAir_average_2.nc
poreSizeBeta1        = soil/BCH_average_1.nc
poreSizeBeta2        = soil/BCH_average_2.nc
resVolWC1            = soil/vmcRes_average_1.nc
resVolWC2            = soil/vmcRes_average_2.nc
satVolWC1            = soil/vmcSat_average_1.nc
satVolWC2            = soil/vmcSat_average_2.nc
KSat1                = soil/kSat_average_1.nc
KSat2                = soil/kSat_average_2.nc
percolationImp       = soil/impeded_drainage.nc
includeIrrigation = True
landCoverTypes = naturalVegetationAndRainFedCrops,irrPaddy,irrNonPaddy
noLandCoverFractionCorrection = False
irrigationEfficiency = irrigation/irrigation_efficiency/efficiency.nc
includeDomesticWaterDemand  = True
includeIndustryWaterDemand  = True
includeLivestockWaterDemand = True
domesticWaterDemandFile  = waterDemand/domestic/domestic_water_demand.nc
industryWaterDemandFile  = waterDemand/industry/industry_water_demand.nc
livestockWaterDemandFile = waterDemand/livestock/livestock_water_demand.nc
desalinationWater = desalination/desalination_water.nc
allocationSegmentsForGroundSurfaceWater    = abstraction_zones/abstraction_zones_60min_05min.nc
irrigationSurfaceWaterAbstractionFractionData           = source_partitioning/surface_water_fraction_for_irrigation/AEI_SWFRAC.nc
irrigationSurfaceWaterAbstractionFractionDataQuality    = source_partitioning/surface_water_fraction_for_irrigation/AEI_QUAL.nc
treshold_to_maximize_irrigation_surface_water           = 0.50
treshold_to_minimize_fossil_groundwater_irrigation      = 0.70
maximumNonIrrigationSurfaceWaterAbstractionFractionData = source_partitioning/surface_water_fraction_for_non_irrigation/max_city_sw_fraction.nc
noParameterExtrapolation = True
glaciers= ./test_input/glaciers_thickness.nc

[naturalVegetationAndRainFedCropsOptions]
name = naturalVegetationAndRainFedCrops
debugWaterBalance = True
snowModuleType      =  Alpine
snowTransport       =  FreyAndHolzmann_pcraster
seasonalMelt        =  False
albedoMelt          =  True
precipitationMelt   =  True
glacierModule       =  False
