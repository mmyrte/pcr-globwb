# Initial conditions
interceptStorIni = 0.0
snowCoverSWEIni  = 0.0
snowFreeWaterIni = 0.0
topWaterLayerIni = 0.0
storUppIni       = 0.0
storLowIni       = 0.0
interflowIni     = 0.0


[irrPaddyOptions]

# ==============================================================================
# LAND COVER TYPE: Irrigated Paddy (e.g. Rice)
